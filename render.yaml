databases:
  - name: scd-db
    plan: free
services:
  - type: web
    name: scd-logistics
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scd-db
          property: connectionString
